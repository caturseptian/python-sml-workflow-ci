name: CI - MLflow Project (Breast Cancer)

# Kriteria 3 (Advanced): jalankan MLflow Project, simpan artefak ke GitHub,
# build Docker image dengan `mlflow models build-docker`, lalu push ke Docker Hub.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  # Semua run MLflow disimpan ke satu file store di root workspace
  MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns
  # Tidak wajib di mlflow 2.19.0; aman sebagai jaga-jaga lintas versi mlflow
  MLFLOW_ALLOW_FILE_STORE: "true"
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-model

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 2. Set up Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # 3. Check Env
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Workspace: ${{ github.workspace }}"
          echo "Tracking URI: ${MLFLOW_TRACKING_URI}"

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4 joblib==1.4.2

      # 5. Run MLflow Project (pakai env lokal, tanpa conda)
      - name: Run mlflow project
        run: |
          mlflow run ./MLProject --env-manager=local \
            -P n_estimators=300 -P max_depth=-1

      # 6. Get latest MLflow run_id
      - name: Get latest MLflow run_id
        id: get_run
        run: |
          RUN_ID=$(cat ./MLProject/run_id.txt)
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "MLflow RUN_ID = ${RUN_ID}"

      # 7. Upload artifacts ke GitHub (penyimpanan: Upload to GitHub)
      - name: Upload to GitHub (MLflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlruns/
            MLProject/run_id.txt

      # ---- Advanced: Docker build & push ----
      # 7b. Patch conda.yaml model -> conda-forge + nodefaults.
      # Mencegah CondaToSNonInteractiveError karena channel default Anaconda
      # (repo.anaconda.com/pkgs/main & pkgs/r) kini mensyaratkan Terms of Service.
      - name: Patch model conda.yaml (hindari Anaconda ToS)
        run: |
          python - <<'PY'
          import glob, yaml
          files = glob.glob("mlruns/**/conda.yaml", recursive=True)
          files = [f for f in files if "model" in f]
          print("conda.yaml ditemukan:", files)
          for p in files:
              with open(p) as f:
                  d = yaml.safe_load(f)
              d["channels"] = ["conda-forge", "nodefaults"]
              with open(p, "w") as f:
                  yaml.safe_dump(d, f, sort_keys=False)
              print(f"--- patched {p} ---")
              print(open(p).read())
          PY

      # 8. Build Docker Model
      # Pakai --env-manager conda (base image miniconda3). Mode default
      # (virtualenv) rusak: install python3.9 + get-pip generik gagal karena
      # URL get-pip sudah tidak mendukung Python 3.9.
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.get_run.outputs.run_id }}/model" \
            -n "${DOCKER_IMAGE}" \
            --env-manager conda

      # 9. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 10. Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag "${DOCKER_IMAGE}" "${DOCKER_IMAGE}:latest"

      # 11. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push "${DOCKER_IMAGE}:latest"
